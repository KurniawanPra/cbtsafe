<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – CBT SAFE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="cbt-card p-4 p-md-5">

      <div class="brand-logo">
        <i class="bi bi-shield-check"></i>
      </div>

      <h1 class="login-title">CBT SAFE</h1>
      <p class="login-sub">
        <span id="namaAplikasi">Sistem Ujian Online</span><br>
        <strong id="namaSekolah" style="color:var(--blue-600);"></strong>
      </p>

      <form id="loginForm" novalidate>
        <div class="mb-4">
          <label for="inputNama" class="form-label">
            <i class="bi bi-person me-1" style="color:var(--blue-500);"></i>
            Nama Lengkap
          </label>
          <input
            type="text"
            id="inputNama"
            class="cbt-input"
            placeholder="Contoh: Budi Santoso"
            autocomplete="name"
            autofocus
          >
        </div>

        <div id="loginAlert" class="alert alert-danger d-none mb-3 py-2 px-3">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span id="loginAlertMsg"></span>
        </div>

        <button type="submit" class="btn-blue">
          <i class="bi bi-box-arrow-in-right"></i>
          Masuk ke Dashboard
        </button>
      </form>

      <div class="sec-badges">
        <span class="sec-badge"><i class="bi bi-shield-lock-fill"></i> KIPS Aktif</span>
        <span class="sec-badge"><i class="bi bi-eye-slash-fill"></i> Anti-Cheat</span>
        <span class="sec-badge"><i class="bi bi-wifi"></i> Online Monitor</span>
      </div>

    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
  document.getElementById("namaAplikasi").textContent = CONFIG.namaAplikasi || "Sistem Ujian Online";
  document.getElementById("namaSekolah").textContent = CONFIG.namaSekolah || "";

  redirectIfLoggedIn("dashboard.html");

  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const nama = document.getElementById("inputNama").value.trim();
    const alertEl = document.getElementById("loginAlert");
    const alertMsg = document.getElementById("loginAlertMsg");

    if (!nama || nama.length < 2) {
      alertEl.classList.remove("d-none");
      alertMsg.textContent = "Masukkan nama lengkap Anda (minimal 2 karakter).";
      document.getElementById("inputNama").focus();
      return;
    }

    alertEl.classList.add("d-none");
    setSession({ nama: nama, waktuLogin: new Date().toISOString() });
    window.location.href = "dashboard.html";
  });
</script>
</body>
</html>
