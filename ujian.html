<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Aktif - CBT SAFE v2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css?v=6" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
      <link rel="icon" href="img/logo.png" type="image/png">
    <style>
        /* Disable text selection during exam */
        body { user-select: none; -webkit-user-select: none; }
        
        /* ===== NAVIGASI BAWAH ===== */
        .navigasi-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ffffff;
            border-top: 1.5px solid #e5e7eb;
            padding: 0.5rem 0.75rem 0.6rem;
            box-shadow: 0 -4px 14px rgba(0,0,0,0.07);
            z-index: 90;
        }
        
        .main-exam-content {
            margin-bottom: 160px;
        }

        /* Baris 1: Info soal */
        .nav-info-row {
            text-align: left;
            margin-bottom: 0.2rem;
            margin-left: 0.25rem;
        }

        /* Baris 2: Action Row (Buttons + Grid) */
        .nav-action-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
        }

        /* Baris 2: Grid kotak nomor */
        .nav-grid-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .navigasi-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            max-width: 100%;
        }

        /* Kotak nomor soal - slightly larger */
        .nav-kotak {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 2px solid #d1d5db;
            background: #f9fafb;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            color: #374151;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .nav-kotak:hover  { background: #eff6ff; border-color: #60a5fa; color: #1d4ed8; }
        .nav-kotak.aktif  { background: #3b82f6; border-color: #1d4ed8; color: white; box-shadow: 0 0 0 2px rgba(59,130,246,0.25); }
        .nav-kotak.dijawab { background: #10b981; border-color: #059669; color: white; }
        .nav-kotak.aktif.dijawab { background: #059669; border-color: #047857; }

        /* Compact prev/next/selesai */
        .btn-nav-exam {
            padding: 0.35rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 7px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
    </style>
</head>
<body class="bg-light">

<!-- Peringatan KIPS (Tab Switch) -->
<div id="kipsOverlay" class="d-none" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(220,53,69,0.95); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center;">
    <i class="bi bi-exclamation-octagon-fill" style="font-size: 5rem; margin-bottom: 1rem;"></i>
    <h1 class="fw-bold">PELANGGARAN TERDETEKSI</h1>
    <p class="fs-4">Anda keluar dari layar ujian!</p>
    <p>Pelanggaran dicatat oleh sistem. Jika melewati batas, ujian akan dihentikan paksa.</p>
    <button class="btn btn-light btn-lg mt-4 fw-bold" onclick="kembaliKeUjian()">KEMBALI KE UJIAN</button>
</div>

<!-- Header -->
<div class="ujian-header px-3 px-md-4">
    <div class="d-flex align-items-center fw-bold text-secondary text-truncate" style="max-width: 30%;">
        <i class="bi bi-person-circle me-2 fs-5"></i> 
        <span id="siswaNameBar" class="text-truncate">Siswa</span>
    </div>
    <div class="timer-box shadow-sm" id="timerDisplay">00:00</div>
    <div class="d-none d-md-block fw-bold text-muted text-end text-truncate" style="max-width: 30%; font-size: 0.9rem;" id="paketNameBar">
        Memuat...
    </div>
</div>

<div class="container main-exam-content mt-4">
    <!-- Kontainer Soal -->
    <div class="soal-container" id="soalContainer">
        <!-- Render from JS -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary mb-3"></div>
            <h5>Menyiapkan soal ujian Anda...</h5>
        </div>
    </div>
</div>

<!-- ===== NAVIGASI BAWAH (single column) ===== -->
<div class="navigasi-wrap">
    <div class="container-fluid" style="max-width: 1000px;">

        <!-- Baris 1: Info soal aktif (di atas grid) -->
        <div class="nav-info-row">
            <span class="fw-bold text-primary" style="font-size:0.85rem; letter-spacing: 0.5px;" id="infoSoalAktif">SOAL - / -</span>
        </div>

        <!-- Baris 2: Buttons + Grid -->
        <div class="nav-action-row">
            <!-- Pojok Kiri: Navigation Buttons -->
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-nav-exam shadow-sm" id="btnPrev" title="Soal Sebelumnya">
                    <i class="bi bi-arrow-left-short fs-5"></i><span>Prev</span>
                </button>
                <button class="btn btn-outline-primary btn-nav-exam shadow-sm" id="btnNext" title="Soal Selanjutnya">
                    <span>Next</span><i class="bi bi-arrow-right-short fs-5"></i>
                </button>
            </div>

            <!-- Tengah: Grid Nomor Soal -->
            <div class="nav-grid-container">
                <div class="navigasi-grid" id="navGrid">
                    <!-- Nav rendered from JS -->
                </div>
            </div>

            <!-- Pojok Kanan: Selesai -->
            <div style="min-width: 100px; display: flex; justify-content: flex-end;">
                <button class="btn btn-success btn-nav-exam fw-bold d-none shadow-sm" id="btnSelesai" onclick="submitUjianManual()">
                    <i class="bi bi-check2-all fs-5"></i><span>Selesai</span>
                </button>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/firebase-config.js?v=6"></script>
<script src="js/auth.js?v=6"></script>
<script src="js/ujian.js?v=6"></script>
</body>
</html>
