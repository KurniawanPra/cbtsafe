<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Aktif - CBT SAFE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css?v=6" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
      <link rel="icon" href="img/logo.png" type="image/png">
    <style>
        /* Disable text selection during exam */
        body { user-select: none; -webkit-user-select: none; }
        
        /* ===== NAVIGASI SAMPING / BAWAH ===== */
        .navigasi-wrap {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .main-exam-content {
            margin-bottom: 60px;
        }

        /* Nav Header */
        .nav-info-row {
            text-align: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px dashed #e5e7eb;
        }

        /* Buttons under grid */
        .nav-action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
            padding-top: 1rem;
        }

        /* Grid kotak nomor */
        .nav-grid-container {
            display: flex;
            justify-content: center;
        }

        .navigasi-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        /* Kotak nomor soal */
        .nav-kotak {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 2px solid #d1d5db;
            background: #f9fafb;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            color: #374151;
            transition: all 0.15s;
        }
        .nav-kotak:hover  { background: #eff6ff; border-color: #60a5fa; color: #1d4ed8; }
        .nav-kotak.aktif  { background: #3b82f6; border-color: #1d4ed8; color: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.25); }
        .nav-kotak.dijawab { background: #10b981; border-color: #059669; color: white; }
        .nav-kotak.aktif.dijawab { background: #059669; border-color: #047857; }

        .btn-nav-exam {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        @media (max-width: 991px) {
            .nav-kotak {
                width: 44px; /* Lebih besar di mobile agar mudah disentuh */
                height: 44px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body class="bg-light">

<!-- Peringatan KIPS (Tab Switch) -->
<div id="kipsOverlay" class="d-none" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(220,53,69,0.95); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center;">
    <i class="bi bi-exclamation-octagon-fill" style="font-size: 5rem; margin-bottom: 1rem;"></i>
    <h1 class="fw-bold">PELANGGARAN TERDETEKSI</h1>
    <p class="fs-4">Anda keluar dari layar ujian!</p>
    <p>Pelanggaran dicatat oleh sistem. Jika melewati batas, ujian akan dihentikan paksa.</p>
    <button class="btn btn-light btn-lg mt-4 fw-bold" onclick="kembaliKeUjian()">KEMBALI KE UJIAN</button>
</div>

<!-- Header -->
<div class="ujian-header px-3 px-md-4">
    <div class="d-flex align-items-center fw-bold text-secondary text-truncate" style="max-width: 40%;">
        <i class="bi bi-person-circle me-2 fs-5"></i> 
        <span id="siswaNameBar" class="text-truncate">Siswa</span>
    </div>
    <div class="timer-box shadow-sm" id="timerDisplay">00:00</div>
    <div class="fw-bold text-muted text-end text-truncate d-none d-md-block" style="max-width: 40%; font-size: 0.9rem;" id="paketNameBar">
        Memuat...
    </div>
</div>

<div class="container main-exam-content mt-4">
    <div class="row">
        <!-- Kolom Soal (Kiri 8 kolom di Desktop, Full di Mobile) -->
        <div class="col-lg-8 col-md-12 mb-4">
            <div class="soal-container bg-white shadow-sm rounded-4 p-4 border" id="soalContainer" style="min-height: 400px;">
                <!-- Render from JS -->
                <div class="text-center py-5">
                    <div class="spinner-border text-primary mb-3"></div>
                    <h5>Menyiapkan soal ujian Anda...</h5>
                </div>
            </div>
        </div>

        <!-- Kolom Navigasi (Kanan 4 kolom di Desktop, Bawah di Mobile) -->
        <div class="col-lg-4 col-md-12">
            <div class="navigasi-wrap sticky-lg-top" style="top: 80px;">
                <!-- Info Status Soal -->
                <div class="nav-info-row">
                    <span class="fw-bold text-primary" style="font-size:0.95rem; letter-spacing: 0.5px;" id="infoSoalAktif">SOAL - / -</span>
                </div>

                <!-- Grid Nomor Soal -->
                <div class="nav-grid-container mb-2">
                    <div class="navigasi-grid" id="navGrid">
                        <!-- Nav rendered from JS -->
                    </div>
                </div>

                <!-- Action Row (Prev/Next/Selesai) -->
                <div class="nav-action-row">
                    <button class="btn btn-outline-secondary btn-nav-exam flex-grow-1 justify-content-center" id="btnPrev" title="Soal Sebelumnya">
                        <i class="bi bi-arrow-left-short fs-5 me-1"></i> Prev
                    </button>
                    <button class="btn btn-outline-primary btn-nav-exam flex-grow-1 justify-content-center" id="btnNext" title="Soal Selanjutnya">
                        Next <i class="bi bi-arrow-right-short fs-5 ms-1"></i>
                    </button>
                </div>

                <button class="btn btn-success btn-nav-exam w-100 justify-content-center mt-3 d-none shadow-sm text-uppercase fw-bold" id="btnSelesai" onclick="submitUjianManual()">
                    <i class="bi bi-check-circle me-2 fs-5"></i> Selesai Ujian
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/firebase-config.js?v=6"></script>
<script src="js/auth.js?v=6"></script>
<script src="js/ujian.js?v=6"></script>
</body>
</html>
