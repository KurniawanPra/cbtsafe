<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 – Server Error | PPLG47</title>
  <link rel="icon" href="img/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f0a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(239,68,68,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 80% at 80% 80%, rgba(245,158,11,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .error-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.35);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fca5a5;
      margin-bottom: 2rem;
    }

    .error-icon {
      font-size: 72px;
      margin-bottom: 1rem;
      animation: shake 2s ease-in-out infinite;
    }

    @keyframes shake {
      0%, 90%, 100% { transform: rotate(0deg); }
      93% { transform: rotate(-5deg); }
      96% { transform: rotate(5deg); }
    }

    .error-code {
      font-size: clamp(80px, 20vw, 150px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #ef4444 0%, #f59e0b 60%, #ef4444 100%);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      letter-spacing: -0.04em;
      animation: gradient-shift 4s ease-in-out infinite, pulse-glow-red 3s ease-in-out infinite;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes pulse-glow-red {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(239,68,68,0.4)); }
      50% { filter: drop-shadow(0 0 40px rgba(239,68,68,0.7)); }
    }

    h1 {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      max-width: 420px;
      line-height: 1.7;
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-danger-err {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(239,68,68,0.4);
    }
    .btn-danger-err:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(239,68,68,0.5);
      color: #fff;
    }

    .btn-ghost-err {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost-err:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    .info-box {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 10px;
      padding: 14px 18px;
      max-width: 420px;
      margin-bottom: 2rem;
      text-align: left;
    }
    .info-box .icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .info-box p { font-size: 13px; color: rgba(255,200,100,0.8); line-height: 1.55; margin: 0; }

    .dot {
      position: fixed;
      border-radius: 50%;
      background: rgba(239,68,68,0.1);
      animation: float linear infinite;
    }
    .dot:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 5%; animation-duration: 9s; }
    .dot:nth-child(2) { width: 50px; height: 50px; top: 70%; left: 90%; animation-duration: 11s; animation-delay: -3s; }
    .dot:nth-child(3) { width: 35px; height: 35px; top: 40%; left: 80%; animation-duration: 7s; animation-delay: -5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    .content { position: relative; z-index: 2; text-align: center; }
  </style>
</head>
<body>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>

  <div class="content">
    <div class="error-badge">
      <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13" stroke="white" stroke-width="2"/><line x1="12" y1="17" x2="12.01" y2="17" stroke="white" stroke-width="2"/></svg>
      Error 500
    </div>

    <div class="error-icon">⚠️</div>
    <div class="error-code">500</div>

    <h1>Terjadi Kesalahan Server</h1>
    <p>Maaf, ada masalah di server kami saat memproses permintaan Anda. Tim teknis sudah diberitahu.</p>

    <div class="info-box">
      <span class="icon">💡</span>
      <p>Coba refresh halaman ini atau kembali ke halaman utama. Jika masalah berlanjut, hubungi administrator.</p>
    </div>

    <div class="btn-group">
      <a href="javascript:location.reload()" class="btn-danger-err">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Coba Lagi
      </a>
      <a href="index.html" class="btn-ghost-err">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Ke Halaman Login
      </a>
    </div>
  </div>
</body>
</html>
